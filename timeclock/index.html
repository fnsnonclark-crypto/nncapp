<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>근태관리 시스템 - 로그인</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .page-title {
            color: var(--text-main);
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            margin: 0;
        }
        .legend-btn-container {
            position: absolute;
            right: 2rem;
        }
        .btn-legend {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.6rem 1.2rem;
            border-radius: 0; /* Changed to 0 */
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .btn-legend:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        /* Modal for Legend */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            width: 380px;
            color: var(--text-main);
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .modal-close {
            position: absolute;
            top: 1.2rem;
            right: 1.5rem;
            cursor: pointer;
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.3s;
        }
        .modal-close:hover {
            color: var(--text-main);
        }
        
        /* 모든 모서리 둥글기 제거 (요청사항) */
        .login-card {
            border-radius: 0 !important;
        }
        .form-control {
            border-radius: 0 !important;
        }
        .btn-login {
            border-radius: 0 !important;
        }
        .modal-content {
            border-radius: 0 !important;
        }
    </style>
</head>
<body>
    <header class="page-header">
        <h1 class="page-title"><i class="fa-solid fa-clock"></i> Finenuts 출퇴근 관리</h1>
        <div class="legend-btn-container">
            <button class="btn-legend" id="btnOpenLegend"><i class="fa-solid fa-circle-info"></i> 범례</button>
        </div>
    </header>

    <div class="login-wrapper">
        <div class="glass-panel login-card fade-in">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" class="form-control" placeholder="user@test.com" required>
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="btn-primary btn-login" style="margin-bottom: 1rem;">로그인</button>
                <div style="text-align: center;">
                    <button type="button" id="btnOpenRegister" class="btn-logout" style="border: none; background: none; color: var(--text-muted); cursor: pointer; font-size: 0.95rem; text-decoration: underline; padding: 0.5rem;"><i class="fa-solid fa-user-plus"></i> 처음이신가요? 등록하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 범례 모달 팝업 -->
    <div class="modal-overlay" id="legendModal">
        <div class="modal-content">
            <span class="modal-close" id="btnCloseLegend"><i class="fa-solid fa-xmark"></i></span>
            <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; font-size: 1.2rem;"><i class="fa-solid fa-key"></i> 테스트 계정 안내</h3>
            <div style="font-size: 1rem; line-height: 1.8; color: var(--text-main);">
                <div style="margin-bottom: 1.2rem; background: rgba(0,0,0,0.2); padding: 1rem;">
                    <strong style="color: var(--primary);"><i class="fa-solid fa-user"></i> 일반 사용자</strong><br>
                    ID : user@test.com<br>
                    PW : password
                </div>
                <div style="background: rgba(0,0,0,0.2); padding: 1rem;">
                    <strong style="color: var(--warning);"><i class="fa-solid fa-user-shield"></i> 관리자</strong><br>
                    ID : admin@test.com<br>
                    PW : password
                </div>
            </div>
        </div>
    </div>

    <!-- 회원가입 모달 팝업 -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal-content" style="width: 420px; max-height: 90vh; overflow-y: auto;">
            <span class="modal-close" id="btnCloseRegister"><i class="fa-solid fa-xmark"></i></span>
            <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; font-size: 1.2rem;"><i class="fa-solid fa-address-card"></i> 신규 직원 등록</h3>
            <form id="signupForm" style="display: flex; flex-direction: column; gap: 1.2rem;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="signupEmail">이메일</label>
                    <input type="email" id="signupEmail" class="form-control" placeholder="user@company.com" required>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="signupName">이름</label>
                    <input type="text" id="signupName" class="form-control" placeholder="홍길동" required>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="signupDept">부서</label>
                    <input type="text" id="signupDept" class="form-control" placeholder="개발팀" required>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="signupPassword">비밀번호</label>
                    <input type="password" id="signupPassword" class="form-control" placeholder="비밀번호 입력" required>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="signupConfirmPassword">비밀번호 확인</label>
                    <input type="password" id="signupConfirmPassword" class="form-control" placeholder="비밀번호 재입력" required>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 0.5rem; padding: 1rem; font-size: 1.1rem;"><i class="fa-solid fa-check"></i> 정보등록</button>
            </form>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnOpen = document.getElementById('btnOpenLegend');
            const btnClose = document.getElementById('btnCloseLegend');
            const modal = document.getElementById('legendModal');

            btnOpen.addEventListener('click', () => {
                modal.classList.add('active');
            });

            btnClose.addEventListener('click', () => {
                modal.classList.remove('active');
            });

            // 모달 바깥 배경 클릭 시 닫기
            modal.addEventListener('click', (e) => {
                if(e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
