<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>근태관리 시스템 - 관리자 페이지</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <a href="main.html" class="logo"><i class="fa-solid fa-clock"></i> Finenuts 출퇴근 관리</a>
        <nav>
            <ul>
                <li><a href="main.html">메인</a></li>
                <li><a href="mypage.html">마이페이지</a></li>
                <li><a href="admin.html" class="active">관리자 페이지</a></li>
            </ul>
        </nav>
        <div class="user-info">
            <span id="userName" class="fw-500">사용자님</span>
            <button onclick="logout()" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> 로그아웃</button>
        </div>
    </header>

    <main class="container">
        <div class="page-header fade-in">
            <div>
                <h2>직원 근태 현황</h2>
                <p>오늘의 모든 직원 출퇴근 상태를 확인합니다.</p>
            </div>
            <div style="background: rgba(16, 185, 129, 0.1); padding: 0.5rem 1rem; border-radius: 0; border: 1px solid rgba(16, 185, 129, 0.2);">
                <i class="fa-solid fa-users"></i> 실시간 모니터링 중
            </div>
        </div>

        <div class="glass-panel fade-in delay-1 admin-panel">
            <h3 class="mb-1_5 fs-1_2"><i class="fa-solid fa-user-plus"></i> 신규 직원 등록</h3>
            <form id="registerForm" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem;">
                <div class="form-group form-group-sm">
                    <label for="regName">이름</label>
                    <input type="text" id="regName" class="form-control" placeholder="홍길동" required>
                </div>
                <div class="form-group form-group-sm">
                    <label for="regEmail">이메일</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="user@test.com" required>
                </div>
                <div class="form-group form-group-sm">
                    <label for="regPassword">비밀번호</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="비밀번호 입력" required>
                </div>
                <div class="form-group form-group-sm">
                    <label for="regDept">부서</label>
                    <input type="text" id="regDept" class="form-control" placeholder="개발팀" required>
                </div>
                <div class="form-group form-group-sm flex-end-gap">
                    <button type="submit" class="btn-primary flex-1"><i class="fa-solid fa-plus"></i> 등록</button>
                    <button type="button" id="btnExportJson" class="btn-logout" title="JSON으로 저장"><i class="fa-solid fa-download"></i></button>
                </div>
            </form>
        </div>

        <div class="glass-panel table-container fade-in delay-2">
            <table>
                <thead>
                    <tr>
                        <th class="w-50 text-center"><input type="checkbox" id="selectAll"></th>
                        <th>이름</th>
                        <th>부서</th>
                        <th>출근 시간</th>
                        <th>퇴근 시간</th>
                        <th>상태</th>
                        <th>이메일</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    <!-- Data will be populated by JS -->
                </tbody>
            </table>
        </div>
        
        <div class="fade-in delay-3 admin-action-btns">
            <button id="btnClockOutAll" class="btn-primary" style="background-color: var(--warning); border: none; padding: 0.75rem 1.5rem;"><i class="fa-solid fa-clock"></i> 모든 직원 퇴근처리</button>
            <button id="btnDeleteSelected" class="btn-logout" style="border-color: var(--danger); color: var(--danger); padding: 0.75rem 1.5rem;"><i class="fa-solid fa-trash"></i> 선택삭제</button>
            <button id="btnDeleteAll" class="btn-logout" style="background: rgba(239, 68, 68, 0.1); border-color: var(--danger); color: var(--danger); padding: 0.75rem 1.5rem;"><i class="fa-solid fa-trash-can"></i> 전체삭제</button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
