<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>근태관리 시스템 - 로그인</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
</head>
<body>
    <header class="page-header">
        <h1 class="page-title"><i class="fa-solid fa-clock"></i> Finenuts 출퇴근 관리</h1>
        <div class="legend-btn-container">
            <button class="btn-legend" id="btnOpenLegend"><i class="fa-solid fa-circle-info"></i> 범례</button>
        </div>
    </header>

    <div class="login-wrapper">
        <div class="glass-panel login-card fade-in">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" class="form-control" placeholder="user@test.com" required>
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="btn-primary btn-login btn-login-margin">로그인</button>
                <div class="text-center">
                    <button type="button" id="btnOpenRegister" class="btn-logout" style="border: none; background: none; color: var(--text-muted); cursor: pointer; font-size: 0.95rem; text-decoration: underline; padding: 0.5rem;"><i class="fa-solid fa-user-plus"></i> 처음이신가요? 등록하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 범례 모달 팝업 -->
    <div class="modal-overlay" id="legendModal">
        <div class="modal-content">
            <span class="modal-close" id="btnCloseLegend"><i class="fa-solid fa-xmark"></i></span>
            <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; font-size: 1.2rem;"><i class="fa-solid fa-key"></i> 테스트 계정 안내</h3>
            <div style="font-size: 1rem; line-height: 1.8; color: var(--text-main);">
                <div style="margin-bottom: 1.2rem; background: rgba(0,0,0,0.2); padding: 1rem;">
                    <strong style="color: var(--primary);"><i class="fa-solid fa-user"></i> 일반 사용자</strong><br>
                    ID : user@test.com<br>
                    PW : password
                </div>
                <div style="background: rgba(0,0,0,0.2); padding: 1rem;">
                    <strong style="color: var(--warning);"><i class="fa-solid fa-user-shield"></i> 관리자</strong><br>
                    ID : admin@test.com<br>
                    PW : password
                </div>
            </div>
        </div>
    </div>

    <!-- 회원가입 모달 팝업 -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal-content modal-register">
            <span class="modal-close" id="btnCloseRegister"><i class="fa-solid fa-xmark"></i></span>
            <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; font-size: 1.2rem;"><i class="fa-solid fa-address-card"></i> 신규 직원 등록</h3>
            <form id="signupForm" class="form-register">
                <div class="form-group form-group-sm">
                    <label for="signupEmail">이메일</label>
                    <input type="email" id="signupEmail" class="form-control" placeholder="user@company.com" required>
                </div>
                <div class="form-group form-group-sm">
                    <label for="signupName">이름</label>
                    <input type="text" id="signupName" class="form-control" placeholder="홍길동" required>
                </div>
                <div class="form-group form-group-sm">
                    <label for="signupDept">부서</label>
                    <input type="text" id="signupDept" class="form-control" placeholder="개발팀" required>
                </div>
                <div class="form-group form-group-sm">
                    <label for="signupPassword">비밀번호</label>
                    <input type="password" id="signupPassword" class="form-control" placeholder="비밀번호 입력" required>
                </div>
                <div class="form-group form-group-sm">
                    <label for="signupConfirmPassword">비밀번호 확인</label>
                    <input type="password" id="signupConfirmPassword" class="form-control" placeholder="비밀번호 재입력" required>
                </div>
                <button type="submit" class="btn-primary btn-register-submit"><i class="fa-solid fa-check"></i> 정보등록</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnOpen = document.getElementById('btnOpenLegend');
            const btnClose = document.getElementById('btnCloseLegend');
            const modal = document.getElementById('legendModal');

            btnOpen.addEventListener('click', () => {
                modal.classList.add('active');
            });

            btnClose.addEventListener('click', () => {
                modal.classList.remove('active');
            });

            // 모달 바깥 배경 클릭 시 닫기
            modal.addEventListener('click', (e) => {
                if(e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
